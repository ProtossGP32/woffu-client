name: CI

# Required permissions for self-hosted runners
permissions:
  contents: write  # ✅ Required for softprops/action-gh-release to create a release
  packages: write  # (optional, if you ever use GHCR)
  id-token: write  # (optional, if you ever use OIDC for secrets)

# Cancel any in-progress workflow run for the same branch or tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
    # Trigger workflow on tag push explicitly
    tags:
      - 'v*.*.*'  # trigger only on tags for releases
    paths-ignore:
      - 'github/ISSUE_TEMPLATE/*'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'github/ISSUE_TEMPLATE/*'
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  # pre-commit:
  #   if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
  #   runs-on: self-hosted
  #   container:
  #     image: ubuntu:latest
  #   steps:
  #   - uses: actions/checkout@v7
  #   - name: Setup Python
  #     uses: actions/setup-python@v6.3.0
  #     with:
  #       python-version: 3.11
  #   - uses: pre-commit/action@v3.0.1
  #     name: Pre-commit checks

  test:
    # needs: pre-commit
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
    name: Test ${{ matrix.os }} / Python ${{ matrix.python }}
    #runs-on: [ self-hosted, "${{ matrix.os }}" ]
    runs-on: self-hosted
    # Container is required for self-hosted runners
    container:
      image: ubuntu:latest
    env:
      # actions/setup-python's prebuilt tarballs hardcode their sysconfig
      # install prefix as /opt/hostedtoolcache/... (the GitHub-hosted-runner
      # convention). This self-hosted runner defaults RUNNER_TOOL_CACHE to
      # <work>/_tool instead, so the interpreter runs fine but sysconfig
      # still points C-extension builds (pycairo) at headers that were never
      # extracted there. Force the path setup-python's tarballs expect.
      RUNNER_TOOL_CACHE: /opt/hostedtoolcache
    strategy:
      matrix:
        # macOS and Windows disabled to save free GitHub Actions minutes.
        # Uncomment to re-enable multi-OS testing:
        # os: [ubuntu-latest, macos-latest, windows-latest]
        os: [ubuntu-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Checkout repo so that test code and pyproject.toml are available

      - name: Setup Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python }}

      - name: Ensure pip cache directory exists
        run: mkdir -p ${{ runner.os == 'macOS' && '~/Library/Caches/pip' || '~/.cache/pip' }}

      - name: Cache pip
        uses: actions/cache@v6.1.0
        with:
          path: ${{ runner.os == 'macOS' && '~/Library/Caches/pip' || '~/.cache/pip' }}
          key: ${{ runner.os }}-pip-${{ matrix.python }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python }}-

      - name: Install OS dependencies
        run: |
          apt-get update && apt-get install -y sqlite3 \
            python3-dev build-essential libcairo2-dev \
            gir1.2-ayatanaappindicator3-0.1 gir1.2-glib-2.0 gir1.2-gtk-3.0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,gui]"

      - name: Run tests
        env:
          # Not required but explicitly defined to warn user that tests are executed in this timezone
          TZ: Europe/Madrid
        run: pytest -v --maxfail=1 --disable-warnings --junitxml coverage/report.xml --cov-report term --cov-report xml:coverage/coverage.xml --cov=. tests

      - name: Upload coverage reports - Only for Python 3.11
        if: ${{ matrix.python == '3.11' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          # Use unique artifact names per OS/Python version to avoid conflicts
          name: 'coverage'
          path: 'coverage/*.xml'
          if-no-files-found: warn
          overwrite: true

  # # Use GitHub Code coverage bot
  # # Disabled: upload-code-coverage keeps failing with an HTTP 404 Not found error. Only available to entreprise owners?
  # upload-coverage:
  #   name: Upload to GitHub Code coverage
  #   needs: test
  #   if: ${{ !cancelled() && needs.test.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #     code-quality: write
  #     pull-requests: read
  #   steps:
  #     - name: Download coverage artifacts
  #       uses: actions/download-artifact@v8.0.1
  #       with:
  #         name: coverage

  #     - name: Install GitHub CLI
  #       uses: actions4gh/setup-gh@v1.0.2
  #       if: ${{ runner.environment == 'self-hosted' }}

  #     - name: DEBUG - coverage file location
  #       id: debug_coverage_location
  #       run: |
  #         pwd
  #         find . -type f -name "*.xml" -exec readlink -f {} \;

  #     - name: Upload coverage for GitHub
  #       uses: actions/upload-code-coverage@v1.3.0
  #       with:
  #         file: coverage.xml
  #         language: Python
  #         label: code-coverage/pytest

  sonarqube:
    name: Sonarqube coverage
    needs: test
    runs-on: self-hosted
    # Container is required for self-hosted runners
    container:
      image: ubuntu:latest
    steps:
      # Required step for self-hosted instances running job on container
      - name: Install OS dependencies
        run: |
          apt-get update && apt-get install -y curl unzip git jq gpg dirmngr
      - uses: actions/checkout@v7
        with:
          # Disabling shallow clone is recommended for improving relevancy of reporting.
          fetch-depth: 0
      - name: Download coverage artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: coverage
          path: coverage
      # Triggering SonarQube analysis as results of it are required by Quality Gate check.
      - uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # Check the Quality Gate status.
      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} #OPTIONAL
      # Optionally you can use the output from the Quality Gate in another step.
      # The possible outputs of the `quality-gate-status` variable are `PASSED`, `WARN` or `FAILED`.
      #- name: "Example show SonarQube Quality Gate Status value"
      #  run: echo "The Quality Gate status is ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status }}"

  set-version:
    name: Set version from tag
    #runs-on: ubuntu-latest
    runs-on: self-hosted
    container:
      image: ubuntu:latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: get_version
        run: |
          TAG_NAME=${GITHUB_REF##*/}
          echo "Tag name: $TAG_NAME"
          # strip leading "v" just in case
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.os }} / Python ${{ matrix.python }}
    #runs-on: [ self-hosted, "${{ matrix.os }}" ]
    runs-on: self-hosted
    # Container is required for self-hosted runners
    container:
      image: ubuntu:latest
    needs: [test, set-version]
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        # macOS and Windows disabled to save free GitHub Actions minutes.
        # Uncomment to re-enable multi-OS testing:
        # os: [ubuntu-latest, macos-latest, windows-latest]
        os: [ubuntu-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
        # Checkout repo here is required so pyproject.toml and source code exist.

      - name: Setup Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python }}

      - name: Ensure pip cache directory exists
        run: mkdir -p ${{ runner.os == 'macOS' && '~/Library/Caches/pip' || '~/.cache/pip' }}

      - name: Cache pip
        uses: actions/cache@v6.1.0
        with:
          path: ${{ runner.os == 'macOS' && '~/Library/Caches/pip' || '~/.cache/pip' }}
          key: build-pip-${{ runner.os }}-${{ matrix.python }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            build-pip-${{ runner.os }}-${{ matrix.python }}-

      - name: Cache built artifacts
        uses: actions/cache@v6.1.0
        with:
          path: dist
          key: build-dist-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            build-dist-${{ runner.os }}-

      - name: Update pyproject.toml version
        shell: bash
        if: runner.os != 'Windows'
        run: |
          VERSION=${{ needs.set-version.outputs.version }}
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          else
            sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          fi
          echo "pyproject.toml updated to version $VERSION"

      - name: Update pyproject.toml version (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          $Version = "${{ needs.set-version.outputs.version }}"
          (Get-Content pyproject.toml) |
            ForEach-Object { $_ -replace '^version = .*', "version = `"$Version`"" } |
            Set-Content pyproject.toml
          Write-Host "pyproject.toml updated to version $Version"

      - name: DEBUG - Show pyproject.toml content (Should be modified with the correct version)
        run: cat pyproject.toml

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build --sdist --wheel
        # Uses the updated pyproject.toml version

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          # Use unique artifact names per OS/Python version to avoid conflicts
          name: dist-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*
          if-no-files-found: warn
          overwrite: true

  publish:
    name: Publish Package
    #runs-on: ubuntu-latest
    runs-on: self-hosted
    # Container is required for self-hosted runners
    container:
      image: ubuntu:latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    env:
      # For GitHub Packages auth
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Ensure pip cache directory exists
        run: mkdir -p ${{ runner.os == 'macOS' && '~/Library/Caches/pip' || '~/.cache/pip' }}

      - name: Cache pip
        uses: actions/cache@v6.1.0
        with:
          path: ${{ runner.os == 'macOS' && '~/Library/Caches/pip' || '~/.cache/pip' }}
          key: publish-pip-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            publish-pip-${{ runner.os }}-

      - name: Install Twine and tomli
        run: python -m pip install --upgrade pip twine tomli

      - name: Purge old merged artifacts
        run: rm -rf merged_dist

      - name: Download built artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Merge dist artifacts for current version
        shell: bash
        run: |
            mkdir -p merged_dist release_artifacts
            VERSION=${GITHUB_REF_NAME#v}

            # Copy canonical files for PyPI upload
            find artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" \) | while read -r file; do
                base=$(basename "$file")
                if [[ "$base" == *"$VERSION"* ]]; then
                    cp "$file" "merged_dist/$base"

                    # Compute GitHub Release filename: insert matrix info before extension
                    dir=$(dirname "$file")
                    matrix_info=$(basename "$dir" | sed 's/dist-//')  # e.g. ubuntu-latest-py3.11
                    ext="${base##*.}"                                # whl or tar.gz
                    base_noext="${base%.*}"                          # remove last extension
                    if [[ "$ext" == "gz" ]]; then
                        # For tar.gz, remove both .tar.gz
                        base_noext="${base%.tar.gz}"
                        ext="tar.gz"
                    fi
                    cp "$file" "release_artifacts/${base_noext}-${matrix_info}.${ext}"
                fi
            done

            # Debug output
            echo "PyPI artifacts:"
            ls -l merged_dist
            echo "GitHub Release artifacts:"
            ls -l release_artifacts

      # PyPI authentication is done via Trusted publisher OICD instead of API token
      - name: Publish canonical artifacts to PyPI
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python -m twine upload merged_dist/*"$VERSION"*.whl merged_dist/*"$VERSION"*.tar.gz \
            --non-interactive

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          generate_release_notes: true
          files: release_artifacts/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}   # ✅ explicit
